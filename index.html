<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>脳エラー 専用タイマー</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    
    <style>
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            font-family: 'DotGothic16', sans-serif, monospace !important; 
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: black; 
        }
        
        #timerButton {
            position: absolute; top: 0; left: 0; z-index: 1;
            width: 100%; height: 100%; border: none; outline: none;
            background-color: #000; color: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; padding: 0; margin: 0;
        }
        
        .time { 
            font-size: 18vw; 
            font-weight: bold;
            font-family: 'DotGothic16', sans-serif, monospace !important;
            line-height: 1; 
            margin-top: -5vh; 
        }
        
        .error-bg { background-color: #330000 !important; }
        .flash-text { color: #ff3b30 !important; }

        #helpButton {
            position: absolute; top: 15px; right: 15px; z-index: 10;
            width: 50px; height: 50px; background: rgba(255,255,255,0.2);
            border-radius: 50%; border: 1px solid white; color: white;
            font-size: 24px; cursor: pointer;
        }

        #helpModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; color: white; padding: 30px; z-index: 20;
            overflow-y: auto; text-align: left; line-height: 1.6;
        }

        #soundReminderOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }

        #soundReminderBox {
            background: #000; color: #fff;
            padding: 30px; border: 3px solid #fff;
            text-align: center; border-radius: 0px;
            width: 85%; max-width: 400px;
        }

        #soundReminderBox p {
            font-size: 20px; line-height: 1.6; margin-bottom: 25px;
            color: #fff !important;
        }

        #soundReminderOk {
            padding: 12px 45px; background: #fff; color: #000;
            border: none; font-size: 22px; cursor: pointer; font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div id="soundReminderOverlay">
        <div id="soundReminderBox">
            <p>アラーム音を鳴らすため<br>マナーモードをオフに<br>してください</p>
            <button id="soundReminderOk">OK</button>
        </div>
    </div>

    <button id="helpButton">?</button>

    <div id="helpModal">
        <h2>遊び方</h2>
        <p>1. 画面をどこでもタップしてカウントダウンを開始します。</p>
        <p>2. 番が移るたびにタップしてリセットしてください。</p>
        <p>3. 0秒になると警告音が鳴ります。</p>
        <p>※不正指摘時もタップで強制終了できます。</p>
        <button id="closeHelp" style="width: 100%; padding: 15px; background: white; color: black; border: none; font-size: 18px; margin-top: 20px;">閉じる</button>
    </div>

    <button id="timerButton">
        <div id="timeDisplay" class="time">9.00</div>
    </button>

    <script>
        const START_TIME = 9.00; 

        let timeRemaining = START_TIME;
        let timer = null;
        let isError = false;
        let lastSecond = Math.floor(START_TIME);
        let startTimeStamp = 0;
        let isOverlayVisible = true; 
        let wakeLock = null; 
        
        const timerButton = document.getElementById('timerButton');
        const display = document.getElementById('timeDisplay');
        const reminderOverlay = document.getElementById('soundReminderOverlay');
        
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        let activeOscillators = [];

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log("WakeLock取得失敗:", err);
            }
        }

        document.getElementById('soundReminderOk').addEventListener('click', (e) => {
            e.stopPropagation(); 
            reminderOverlay.style.display = 'none'; 
            isOverlayVisible = false; 
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume(); 
            }
            let dummyOsc = audioCtx.createOscillator();
            let dummyGain = audioCtx.createGain();
            dummyGain.gain.setValueAtTime(0.001, audioCtx.currentTime);
            dummyOsc.connect(dummyGain);
            dummyGain.connect(audioCtx.destination);
            dummyOsc.start();
            dummyOsc.stop(audioCtx.currentTime + 0.05);

            requestWakeLock(); 
        });

        function playTickSound() {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function stopAllAlarms() {
            if (activeOscillators.length > 0) {
                activeOscillators.forEach(osc => {
                    try {
                        osc.stop();
                        osc.disconnect();
                    } catch (e) {
                        // エラー無視
                    }
                });
                activeOscillators = []; 
            }
        }

        // 🔊 短く鋭い「ピー！ピー！ピー！」という電子アラーム音
        function playStrongAlarmSound() {
            stopAllAlarms(); 

            const beepDuration = 0.2; // 1回の「ピー」の長さ（0.2秒）
            const gap = 0.1; // 音と音の隙間（0.1秒）
            const cycle = beepDuration + gap; // 1セットにかかる時間
            const repeatCount = 5; // 鳴らす回数

            for (let i = 0; i < repeatCount; i++) {
                let startTime = audioCtx.currentTime + (i * cycle);
                
                let osc1 = audioCtx.createOscillator();
                let gain1 = audioCtx.createGain();
                // 電子音らしい矩形波
                osc1.type = 'square'; 
                osc1.frequency.setValueAtTime(1200, startTime);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                
                // ブチッというノイズを防ぐためのフェードイン・アウト
                gain1.gain.setValueAtTime(0, startTime);
                gain1.gain.linearRampToValueAtTime(0.2, startTime + 0.02);
                gain1.gain.setValueAtTime(0.2, startTime + beepDuration - 0.02);
                gain1.gain.linearRampToValueAtTime(0, startTime + beepDuration);

                let osc2 = audioCtx.createOscillator();
                let gain2 = audioCtx.createGain();
                // 芯を作るためのサイン波
                osc2.type = 'sine'; 
                osc2.frequency.setValueAtTime(1205, startTime); // 少しずらして厚みを出す
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                
                gain2.gain.setValueAtTime(0, startTime);
                gain2.gain.linearRampToValueAtTime(0.3, startTime + 0.02);
                gain2.gain.setValueAtTime(0.3, startTime + beepDuration - 0.02);
                gain2.gain.linearRampToValueAtTime(0, startTime + beepDuration);

                osc1.start(startTime);
                osc2.start(startTime);
                
                osc1.stop(startTime + beepDuration);
                osc2.stop(startTime + beepDuration);

                activeOscillators.push(osc1, osc2);
            }
        }

        function resetAndStartTimer() {
            if (isOverlayVisible) return; 

            stopAllAlarms();

            if (audioCtx.state === 'suspended') audioCtx.resume();
            clearInterval(timer);
            
            timeRemaining = START_TIME;
            lastSecond = Math.floor(START_TIME);
            isError = false;
            startTimeStamp = Date.now();
            
            timerButton.classList.remove('error-bg');
            display.classList.remove('flash-text');
            display.style.color = '#fff';
            display.innerText = timeRemaining.toFixed(2);

            timer = setInterval(() => {
                let elapsed = (Date.now() - startTimeStamp) / 1000;
                timeRemaining = START_TIME - elapsed;
                
                if (timeRemaining <= 0) {
                    timeRemaining = 0.00;
                    clearInterval(timer);
                    isError = true;
                    timerButton.classList.add('error-bg');
                    display.style.color = '#ff3b30';
                    playStrongAlarmSound();
                }
                
                display.innerText = timeRemaining.toFixed(2);
                
                let currentSecond = Math.floor(timeRemaining);
                if (currentSecond < lastSecond && currentSecond >= 0 && !isError) {
                    lastSecond = currentSecond;
                    playTickSound();
                }
                
                if ((timeRemaining % 1.0) > 0.85 && !isError) display.classList.add('flash-text');
                else if (!isError) display.classList.remove('flash-text');
            }, 10);
        }

        timerButton.addEventListener('click', resetAndStartTimer);
        document.getElementById('helpButton').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('helpModal').style.display = 'block';
        });
        document.getElementById('closeHelp').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('helpModal').style.display = 'none';
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && !isOverlayVisible) {
                requestWakeLock();
            }
        });
    </script>
</body>
</html>
